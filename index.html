<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIM for Kids</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.svg" />

    <!-- Version tracking for deployment verification -->
    <meta name="app-version" content="1.0.0" />
    <meta name="build-date" content="2025-07-18" />
    <meta name="git-commit" content="BUILD_COMMIT_SHA" />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="game-container" id="game-container">
      <h1>VIM for Kids</h1>

      <!-- Level Selection (dynamically populated) -->
      <div class="level-selection">
        <!-- Level buttons are now created dynamically by LevelSelectorUI -->
      </div>

      <div class="game-board" id="gameBoard">
        <!-- Grid tiles will be generated by JavaScript -->
      </div>
      <!-- Help button (toggles instructions panel) -->
      <button class="help-button" id="helpButton" title="Help" aria-label="Toggle help">?</button>
      <div class="instructions hidden" id="instructionsPanel">
        <p>
          Use arrow keys or <strong>h</strong> (left), <strong>j</strong> (down),
          <strong>k</strong> (up), <strong>l</strong> (right) to move!
        </p>
        <p>Collect the VIM keys to learn their commands!</p>
        <div class="warning">
          ⚠️ If hjkl keys don't work, disable Vimium/vim extensions for this page or click the game
          board first.
        </div>
      </div>
      <script>
        document.getElementById('helpButton').addEventListener('click', function () {
          document.getElementById('instructionsPanel').classList.toggle('hidden');
        });

        // Level selector: auto-hide after 60s, toggle by clicking title
        (function () {
          var levelBar = document.querySelector('.level-selection');
          var title = document.querySelector('h1');
          var hideTimer = null;
          var shown = true;

          function hideLevels() {
            if (!levelBar || !shown) return;
            shown = false;
            clearTimeout(hideTimer);
            hideTimer = null;
            levelBar.classList.add('hiding');
            setTimeout(function () {
              levelBar.classList.add('hidden-levels');
              levelBar.classList.remove('hiding');
            }, 400);
          }

          function showLevels() {
            if (!levelBar || shown) return;
            shown = true;
            clearTimeout(hideTimer);
            levelBar.classList.remove('hidden-levels', 'hiding');
            void levelBar.offsetWidth;
            hideTimer = setTimeout(hideLevels, 60000);
          }

          // Auto-hide after 60s on page load
          hideTimer = setTimeout(hideLevels, 60000);

          // Toggle on title click
          if (title) {
            title.addEventListener('click', function () {
              if (shown) {
                hideLevels();
              } else {
                showLevels();
              }
            });
          }
        })();
      </script>
      <div class="collected-keys" id="collectedKeys">
        <h3>Collected Keys:</h3>
        <div class="key-display"></div>
      </div>
      <div class="collectible-inventory" id="collectibleInventory">
        <h3>Key Inventory:</h3>
        <div class="collectible-display"></div>
      </div>
    </div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
